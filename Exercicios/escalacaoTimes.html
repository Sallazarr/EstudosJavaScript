<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="escalacaoTimes.js" defer></script>
    <title>Escalação de Times</title>
</head>
<header>
    <h1>Exercicio 11 - Escalação de Times</h1>
</header>
<hr>
<body>
    <h1>Times:</h1>
    <h2>Adicionar Jogador</h2>
    <label for="position">Posição: </label>
    <br>
    <input id="position" type="text">
    <br>
    <label for="name">Nome: </label>
    <br>
    <input id="name" type="text">
    <br>
    <label for="number">Número da camisa: </label>
    <br>
    <input id="number" type="number">
    <br>
    <br>
    <button onclick="addPlayer()">Adicionar Jogador</button>
    <br>
    <br>
    <h2>Remover Jogador</h2>
    <label for="numberRemove">Número da Camisa</label>
    <br>
    <input id="numberRemove" type="number">
    <br>
    <br>
    <button onclick="removePlayer()">Remover Jogador</button>
    <br>
    <br>
    <hr>
    <h3>Jogadores:</h3>
    <ul id="playerUl"></ul>
</body>
</html>
